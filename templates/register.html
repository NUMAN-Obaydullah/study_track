{% extends "base.html" %}

{% block title %}Register - Study Track{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-5">
            <div class="card-body">
                <h3 class="card-title">Register</h3>
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form.as_div }} 
                    
                    <button type="submit" class="btn btn-primary mt-3">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
